services:
  - type: web
    name: productvity-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Productvity Backend
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DEFAULT_PAGE_SIZE
        value: "50"
      - key: MAX_PAGE_SIZE
        value: "200"
